version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_NAME=easymovers
      - DB_USER=root
      - DB_PASS=secret
      - DB_PORT=3306
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: easymovers
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # This mount auto-imports the database schema on first run!
      - ./easymovers.sql:/docker-entrypoint-initdb.d/easymovers.sql

volumes:
  db_data:
